# ==============================================================================
# config.yaml — Central Configuration for Conveyor Belt CV System
# Edit this file to adapt the system to your specific environment.
# ==============================================================================

# ---------------------------------------------------------------------------
# Video / Camera Source
# ---------------------------------------------------------------------------
source:
  type: "file"             # "file" | "webcam" | "rtsp"
  path: "demo/demo-conveyor.mp4"   # Path to video file (if type == "file")
  webcam_index: 0          # Webcam device index (if type == "webcam")
  rtsp_url: ""             # RTSP stream URL (if type == "rtsp")
  width: 1280              # Desired frame width (resize if needed)
  height: 720              # Desired frame height
  fps_cap: 60              # Max FPS cap for processing loop

# ---------------------------------------------------------------------------
# Object Detection (YOLO)
# ---------------------------------------------------------------------------
detection:
  model_path: "models/detection/conveyor_best.pt"  # Path to .pt, .onnx, or .engine
  imgsz: 640               # Inference image size
  conf_threshold: 0.35     # Minimum detection confidence
  iou_threshold: 0.45      # NMS IoU threshold
  device: ""               # "" = auto (cuda if available, else cpu), "cpu", "cuda:0"
  classes: [0, 1, 2, 3, 4, 5] # track all defined classes

# ---------------------------------------------------------------------------
# Multi-Object Tracking (ByteTrack)
# ---------------------------------------------------------------------------
tracking:
  track_thresh: 0.50       # High-confidence threshold for first-stage matching
  low_det_thresh: 0.20     # Low-confidence threshold for second-stage matching
  match_thresh: 0.80       # IoU threshold for track-detection assignment
  track_buffer: 30         # Max frames to keep a lost track alive (max_age)
  min_hits: 2              # Min hits before a track is "Confirmed"

# ---------------------------------------------------------------------------
# Virtual Counting Zones
# zone_y1 and zone_y2 are fractions of the frame HEIGHT (0.0 → 1.0)
# The conveyor moves LEFT → RIGHT (or TOP → BOTTOM depending on camera mount)
# Axis: use "x" for horizontal conveyor, "y" for vertical conveyor
# ---------------------------------------------------------------------------
counting:
  axis: "x"                # "x" (horizontal) or "y" (vertical) conveyor direction
  zone_start: 0.20         # Entry zone end / Tracking zone start (fraction along axis)
  zone_end: 0.80           # Tracking zone end / Exit zone start (fraction along axis)
  count_cache_size: 200    # Number of recently counted IDs to cache (anti-double-count)
  direction: "positive"    # Expected direction of travel: "positive" (left→right / top→bottom)
                           # or "negative" (right→left / bottom→top)
  crop_margin: 10          # Padding in pixels around bounding box for defect crops

# ---------------------------------------------------------------------------
# Defect Classification
# ---------------------------------------------------------------------------
classifier:
  enabled: true
  model_path: "models/classification/mobilenetv3_defect.pt"  # Fine-tuned weights
  input_size: 224          # Classifier input resolution
  defect_threshold: 0.55   # Probability threshold to flag as "Defective"
  num_classes: 2           # 0: Normal, 1: Defective
  simulate: false           # true = random prediction (for demo without real weights)

# ---------------------------------------------------------------------------
# Database (SQLite)
# ---------------------------------------------------------------------------
database:
  path: "data/conveyor.db"
  log_crops: false         # Save crop images to disk alongside DB records

# ---------------------------------------------------------------------------
# Application / Pipeline
# ---------------------------------------------------------------------------
app:
  headless: false          # true = no cv2.imshow window (server/edge mode)
  record_output: true      # Record annotated output video
  output_path: "data/output_annotated.mp4"
  frame_queue_size: 8      # Max frames buffered between capture and processing
  crop_queue_size: 32      # Max pending crop inspections
  db_queue_size: 128       # Max pending database writes

# ---------------------------------------------------------------------------
# Training (YOLO)
# ---------------------------------------------------------------------------
train:
  data_yaml: "data/detection/data.yaml"
  model: "yolov8s.pt"
  epochs: 150
  imgsz: 640
  batch: 2
  device: ""
  optimizer: "AdamW"
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  close_mosaic: 10
  project: "runs/detect"
  name: "conveyor_belt"
